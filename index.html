<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="LottoAmir - פתיחה ישירה למערכת ALL-IN-ONE.">
  <meta http-equiv="refresh" content="0; url=Lotto_All_In_One.html">
  <link rel="canonical" href="Lotto_All_In_One.html">
  <title>LottoAmir - ALL-IN-ONE</title>
  <style>
    :root {
      color-scheme: light;
      --page: #f7f9fb;
      --surface: #ffffff;
      --text: #172033;
      --muted: #5f6f85;
      --border: #dbe3ea;
      --teal: #0f766e;
      --teal-dark: #115e59;
    }

    * {
      box-sizing: border-box;
    }

    body {
      display: grid;
      place-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 24px;
      font-family: "Assistant", "Segoe UI", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(15, 118, 110, 0.14), transparent 28rem),
        linear-gradient(180deg, #ffffff 0%, var(--page) 100%);
    }

    main {
      width: min(520px, 100%);
      padding: 28px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      box-shadow: 0 18px 45px rgba(23, 32, 51, 0.11);
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: 30px;
      line-height: 1.2;
    }

    p {
      margin: 14px 0 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.7;
    }

    .actions {
      display: grid;
      gap: 10px;
      margin-top: 22px;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 10px 16px;
      border-radius: 8px;
      font-weight: 800;
      text-decoration: none;
    }

    .primary {
      color: #ffffff;
      background: var(--teal);
    }

    .secondary {
      color: var(--teal-dark);
      border: 1px solid rgba(15, 118, 110, 0.28);
      background: #eef6f5;
    }
  </style>
</head>
<body>
  <main>
    <h1>LottoAmir ALL-IN-ONE</h1>
    <p>מעביר אותך עכשיו למערכת המשולבת.</p>
    <div class="actions">
      <a class="primary" href="Lotto_All_In_One.html">פתח ALL-IN-ONE</a>
      <a class="secondary" href="hub.html">פתח את דף הכלים</a>
    </div>
  </main>
</body>
</html>
