name: Update Lotto Results

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write

concurrency:
  group: update-lotto-results
  cancel-in-progress: false

jobs:
  update-results:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: .github/requirements-lotto-update.txt

      - name: Install updater dependency
        run: python -m pip install --requirement .github/requirements-lotto-update.txt

      - name: Run updater tests
        run: python -m unittest tests/test_update_lotto_results.py -v

      - name: Download and validate official results
        run: python scripts/update_lotto_results.py

      - name: Detect workbook changes
        id: changes
        shell: bash
        run: |
          if git diff --quiet -- NUMBERS.xlsx; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push updated workbook
        if: steps.changes.outputs.changed == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add NUMBERS.xlsx
          git commit -m "data: update lotto results"
          git push origin HEAD:main

      - name: Ensure GitHub Pages is current
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          target_sha="$(git rev-parse HEAD)"
          latest_build="$(gh api "repos/${GITHUB_REPOSITORY}/pages/builds/latest" --jq '[.commit, .status] | @tsv' 2>/dev/null || true)"
          IFS=$'\t' read -r build_commit build_status <<< "$latest_build"

          if [[ "$build_commit" == "$target_sha" && "$build_status" == "built" ]]; then
            echo "GitHub Pages already serves commit $target_sha"
            exit 0
          fi

          gh api --method POST "repos/${GITHUB_REPOSITORY}/pages/builds"

          for attempt in {1..36}; do
            sleep 10
            latest_build="$(gh api "repos/${GITHUB_REPOSITORY}/pages/builds/latest" --jq '[.commit, .status] | @tsv' 2>/dev/null || true)"
            IFS=$'\t' read -r build_commit build_status <<< "$latest_build"

            if [[ "$build_commit" == "$target_sha" && "$build_status" == "built" ]]; then
              echo "GitHub Pages deployed commit $target_sha"
              exit 0
            fi
            if [[ "$build_commit" == "$target_sha" && "$build_status" == "errored" ]]; then
              echo "GitHub Pages build failed for commit $target_sha" >&2
              exit 1
            fi
            echo "Waiting for GitHub Pages ($attempt/36): ${build_commit:-unknown} ${build_status:-unknown}"
          done

          echo "Timed out waiting for GitHub Pages to deploy commit $target_sha" >&2
          exit 1
