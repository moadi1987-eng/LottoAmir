<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎰 מערכת לוטו מלאה - מילוי + ניתוח</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@400;500;600;700;800&display=swap');

        /* ===== Design Tokens - Dark Pro (תואם למנתח) ===== */
        :root {
            --app-height: 100vh;
            --header-height: 78px;
            --rail-width: 104px;
            --mobile-rail-height: 64px;
            --bg: #0b1120;
            --bg-elevated: #141d2f;
            --bg-card: #1a2439;
            --bg-hover: #22304d;
            --border: #2d3a54;
            --text: #e2e8f0;
            --text-muted: #94a3b8;
            --text-subtle: #64748b;
            --accent: #8b5cf6;
            --accent-hover: #a78bfa;
            --accent-glow: rgba(139, 92, 246, 0.25);
            --accent-subtle: rgba(139, 92, 246, 0.12);
            --success: #10b981;
            --danger: #ef4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%;
        }

        body {
            font-family: 'Assistant', sans-serif;
            background: var(--bg);
            height: var(--app-height);
            min-height: var(--app-height);
            color: var(--text);
            overflow-x: hidden;
            overflow-y: hidden;
        }

        /* ========== MAIN HEADER - קומפקטי ונקי ========== */
        .main-header {
            background: var(--bg-elevated);
            border-bottom: 1px solid var(--border);
            color: var(--text);
            text-align: center;
            padding: 10px 16px 12px;
            position: sticky;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }

        .main-header h1 {
            font-size: 17px;
            font-weight: 800;
            margin-bottom: 1px;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-hover) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.3px;
        }

        .main-header p {
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 10px;
        }

        .main-header .nav-buttons {
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .main-header .nav-btn {
            padding: 7px 16px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 7px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
            font-family: inherit;
            min-height: 38px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            white-space: nowrap;
        }
        .main-header .nav-btn:hover {
            background: var(--bg-hover);
            border-color: var(--accent);
            color: var(--accent-hover);
        }
        .main-header .nav-btn.primary {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }
        .main-header .nav-btn.active {
            background: var(--accent);
            border-color: var(--accent-hover);
            color: white;
            box-shadow: 0 4px 12px var(--accent-glow);
        }
        .main-header .nav-btn.primary:hover {
            background: var(--accent-hover);
            color: white;
            box-shadow: 0 4px 12px var(--accent-glow);
        }

        /* ========== CONTAINER ========== */
        .content-wrapper {
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            width: 100%;
            max-width: none;
            height: calc(var(--app-height) - var(--header-height));
            margin: 0 auto;
            overflow: hidden;
        }

        body.shell-analyzer-active .content-wrapper {
            padding-right: calc(var(--rail-width) + 16px);
        }

        /* ========== SECTION STYLING ========== */
        .section-container {
            display: none;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px;
            overflow: hidden;
            scroll-margin-top: 86px;
            min-height: 0;
            height: 100%;
        }

        .section-container.is-active {
            display: flex;
            flex-direction: column;
        }

        .section-title {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text);
            padding: 6px 10px 10px;
            text-align: right;
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 12px;
        }
        .section-title::before {
            content: '';
            width: 3px;
            height: 14px;
            background: var(--accent);
            border-radius: 2px;
        }
        .section-title.analyzer::before {
            background: var(--success);
        }

        /* ========== IFRAME POLISH ========== */
        iframe {
            border-radius: 8px;
        }

        .app-frame {
            display: block;
            width: 100%;
            max-width: 100%;
            flex: 1 1 auto;
            height: auto !important;
            min-height: 0 !important;
            overflow: auto;
            -webkit-overflow-scrolling: touch;
        }

        .analyzer-rail {
            position: fixed;
            top: calc(var(--header-height) + 12px);
            right: 10px;
            bottom: 12px;
            width: var(--rail-width);
            display: none;
            flex-direction: column;
            gap: 7px;
            padding: 8px;
            background: rgba(20, 29, 47, 0.92);
            border: 1px solid var(--border);
            border-radius: 10px;
            box-shadow: 0 10px 32px rgba(0,0,0,0.32);
            z-index: 900;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        body.shell-analyzer-active .analyzer-rail {
            display: flex;
        }
        .analyzer-rail-btn {
            min-height: 40px;
            padding: 7px 6px;
            background: var(--bg-card);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
            font-size: 11px;
            font-weight: 700;
            line-height: 1.15;
            transition: all 0.15s;
        }
        .analyzer-rail-btn:hover,
        .analyzer-rail-btn.active {
            background: var(--accent);
            border-color: var(--accent-hover);
            color: white;
            box-shadow: 0 4px 12px var(--accent-glow);
        }

        /* ========== NOTIFICATION ========== */
        .transfer-notification {
            position: fixed;
            top: 16px;
            right: 16px;
            background: var(--bg-card);
            border: 1px solid var(--success);
            padding: 16px 18px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            z-index: 9999;
            transform: translateX(400px);
            transition: transform 0.3s;
            max-width: 340px;
        }
        .transfer-notification.show { transform: translateX(0); }
        .transfer-notification h3 {
            color: var(--success);
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 6px;
        }
        .transfer-notification p {
            color: var(--text-muted);
            font-size: 13px;
            margin-bottom: 10px;
        }
        .transfer-notification button {
            width: 100%;
            padding: 9px;
            background: var(--success);
            color: white;
            border: none;
            border-radius: 7px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.15s;
            font-family: inherit;
            font-size: 13px;
        }
        .transfer-notification button:hover { filter: brightness(1.1); }

        /* ========== SCROLL BUTTON ========== */
        .scroll-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 44px;
            height: 44px;
            background: var(--accent);
            color: white;
            border: 1px solid var(--accent-hover);
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            box-shadow: 0 4px 20px var(--accent-glow);
            display: none;
            z-index: 999;
            transition: all 0.15s;
        }
        .scroll-btn.show {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .scroll-btn:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
        }

        /* ===== Scrollbar ===== */
        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 5px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

        ::selection { background: var(--accent); color: white; }

        /* ===== MOBILE RESPONSIVE ===== */
        @media (max-width: 768px) {
            .main-header { padding: calc(8px + env(safe-area-inset-top)) 10px 10px; }
            .main-header h1 { font-size: 14px; }
            .main-header p { font-size: 10px; margin-bottom: 8px; }
            .main-header .nav-buttons {
                display: grid;
                grid-template-columns: repeat(4, minmax(0, 1fr));
                gap: 6px;
                width: min(100%, 520px);
                margin: 0 auto;
            }
            .main-header .nav-btn {
                width: 100%;
                min-height: 42px;
                padding: 7px 10px;
                font-size: 11px;
            }

            .content-wrapper {
                height: calc(var(--app-height) - var(--header-height));
                padding: 8px;
                gap: 10px;
            }
            body.shell-analyzer-active .content-wrapper {
                padding-right: 8px;
                padding-bottom: calc(var(--mobile-rail-height) + 8px);
            }
            .section-container { padding: 7px; border-radius: 8px; scroll-margin-top: 118px; }
            .section-title { font-size: 12px; padding: 4px 8px 8px; margin-bottom: 8px; }

            #formIframe,
            #analyzerIframe {
                height: auto !important;
                min-height: 0 !important;
            }

            .transfer-notification {
                top: 8px;
                right: 8px;
                left: 8px;
                max-width: none;
                padding: 12px 14px;
                transform: translateY(-200%);
            }
            .transfer-notification.show { transform: translateY(0); }
            .transfer-notification h3 { font-size: 14px; }
            .transfer-notification p { font-size: 12px; }

            .scroll-btn {
                width: 40px;
                height: 40px;
                bottom: 14px;
                right: 14px;
                font-size: 16px;
            }

            .analyzer-rail {
                top: auto;
                right: 0;
                left: 0;
                bottom: 0;
                width: auto;
                min-height: var(--mobile-rail-height);
                flex-direction: row;
                gap: 6px;
                padding: 8px max(8px, env(safe-area-inset-right)) calc(8px + env(safe-area-inset-bottom)) max(8px, env(safe-area-inset-left));
                border-right: 0;
                border-left: 0;
                border-bottom: 0;
                border-radius: 10px 10px 0 0;
                overflow-x: auto;
                overflow-y: hidden;
            }
            .analyzer-rail-btn {
                flex: 0 0 auto;
                min-width: 78px;
                min-height: 42px;
                padding: 7px 10px;
                white-space: nowrap;
            }
        }

        @media (max-width: 480px) {
            .main-header h1 { font-size: 13px; }
            .main-header p { display: none; }
            .main-header .nav-buttons { grid-template-columns: repeat(2, minmax(0, 1fr)); }
            .main-header .nav-btn { width: 100%; }
            #formIframe,
            #analyzerIframe {
                height: auto !important;
                min-height: 0 !important;
            }
        }
    </style>
</head>
<body>
    <!-- Main Header -->
    <div class="main-header">
        <h1>🎰 מערכת לוטו מלאה ALL-IN-ONE</h1>
        <p>מילוי טפסים אוטומטי + ניתוח תוצאות מתקדם במקום אחד!</p>
        <div class="nav-buttons">
            <button class="nav-btn primary active" id="navFormBtn" onclick="setActiveSection('form')" aria-pressed="true">📝 טפסים</button>
            <button class="nav-btn" id="navAnalyzerBtn" onclick="setActiveSection('analyzer')" aria-pressed="false">📊 ניתוח</button>
            <button class="nav-btn" id="navCompareBtn" onclick="openComparisonView()" aria-pressed="false">🎯 השוואה</button>
            <button class="nav-btn print-nav" id="navPrintBtn" onclick="printForm()">🖨️ הדפסה</button>
        </div>
    </div>

    <nav class="analyzer-rail" id="analyzerRail" aria-label="ניווט ניתוח תוצאות">
        <button type="button" class="analyzer-rail-btn" data-target="comparisonCard" onclick="goToAnalyzerSection('comparisonCard')">🎯 השוואה</button>
        <button type="button" class="analyzer-rail-btn" data-target="combosCard" onclick="goToAnalyzerSection('combosCard')">✨ קומבינציות</button>
        <button type="button" class="analyzer-rail-btn" data-target="combosForm2Card" onclick="goToAnalyzerSection('combosForm2Card')">📋 טופס 2</button>
        <button type="button" class="analyzer-rail-btn" data-target="statsCard" onclick="goToAnalyzerSection('statsCard')">📊 סטטיסטיקות</button>
        <button type="button" class="analyzer-rail-btn" data-target="hotCard" onclick="goToAnalyzerSection('hotCard')">🔥 חמים</button>
        <button type="button" class="analyzer-rail-btn" data-target="pairsCard" onclick="goToAnalyzerSection('pairsCard')">🤝 זוגות</button>
        <button type="button" class="analyzer-rail-btn" data-target="tripletsCard" onclick="goToAnalyzerSection('tripletsCard')">🎲 טריפלטים</button>
        <button type="button" class="analyzer-rail-btn" data-target="quartetsCard" onclick="goToAnalyzerSection('quartetsCard')">🎯 רביעיות</button>
        <button type="button" class="analyzer-rail-btn" data-target="pinnedFutureCard" onclick="goToAnalyzerSection('pinnedFutureCard')">📌 PIN</button>
    </nav>
    
    <!-- Transfer Notification -->
    <div class="transfer-notification" id="transferNotification">
        <h3>✅ הקומבינציה הועברה!</h3>
        <p id="transferText">המספרים נשלחו לטופס למעלה</p>
        <button onclick="closeNotification()">הבנתי</button>
    </div>
    
    <!-- Scroll to Top Button -->
    <button class="scroll-btn" id="scrollTopBtn" onclick="scrollToTop()">⬆️</button>
    
    <div class="content-wrapper">
        <!-- ========== FORM FILLER SECTION ========== -->
        <div id="formSection" class="section-container is-active">
            <div class="section-title">📝 מילוי טפסים אוטומטי</div>
            <iframe
                src="Lottery_V41_Final.html"
                class="app-frame form-frame"
                style="width: 100%; height: 1200px; border: none; border-radius: 10px; background: white;"
                id="formIframe"
            ></iframe>
        </div>
        
        <!-- ========== ANALYZER SECTION ========== -->
        <div id="analyzerSection" class="section-container">
            <div class="section-title analyzer">📊 ניתוח תוצאות מתקדם</div>
            <iframe 
                src="lotto_analyzer.html" 
                class="app-frame analyzer-frame"
                style="width: 100%; height: 1000px; border: none; border-radius: 10px;"
                id="analyzerIframe"
            ></iframe>
        </div>
    </div>
    
    <script>
        // ========== GLOBAL FUNCTIONS ==========
        let activeShellSection = 'form';

        function updateViewportMetrics() {
            const viewportHeight = window.visualViewport ? window.visualViewport.height : window.innerHeight;
            const header = document.querySelector('.main-header');
            const headerHeight = header ? Math.ceil(header.getBoundingClientRect().height) : 78;
            document.documentElement.style.setProperty('--app-height', `${Math.round(viewportHeight)}px`);
            document.documentElement.style.setProperty('--header-height', `${headerHeight}px`);
        }

        function setEmbeddedAnalyzerMode() {
            const analyzerIframe = document.getElementById('analyzerIframe');
            if (!analyzerIframe || !analyzerIframe.contentWindow) return;

            try {
                analyzerIframe.contentWindow.document.body.classList.add('embedded-shell');
            } catch (e) {
                console.log('Analyzer embed mode skipped:', e);
            }
        }

        function setActiveRailButton(sectionId) {
            document.querySelectorAll('.analyzer-rail-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.target === sectionId);
            });
        }

        function setActiveSection(section, options) {
            options = options || {};
            const normalized = section === 'analyzer' || section === 'compare' ? 'analyzer' : 'form';
            const activeNav = options.navTarget || (section === 'compare' ? 'compare' : normalized);
            activeShellSection = normalized;
            document.body.classList.toggle('shell-analyzer-active', normalized === 'analyzer');

            document.getElementById('formSection').classList.toggle('is-active', normalized === 'form');
            document.getElementById('analyzerSection').classList.toggle('is-active', normalized === 'analyzer');

            const navMap = {
                form: document.getElementById('navFormBtn'),
                analyzer: document.getElementById('navAnalyzerBtn'),
                compare: document.getElementById('navCompareBtn')
            };

            Object.keys(navMap).forEach(key => {
                const btn = navMap[key];
                if (!btn) return;
                const isActive = key === activeNav;
                btn.classList.toggle('active', isActive);
                btn.classList.toggle('primary', isActive);
                btn.setAttribute('aria-pressed', isActive ? 'true' : 'false');
            });

            updateViewportMetrics();
            if (normalized === 'analyzer') setEmbeddedAnalyzerMode();
            if (!options.preserveScroll) {
                window.scrollTo({ top: 0, behavior: options.smooth ? 'smooth' : 'auto' });
            }
        }

        function goToAnalyzerSection(sectionId, navTarget) {
            setActiveSection('analyzer', { preserveScroll: true, navTarget: navTarget || 'analyzer' });
            setActiveRailButton(sectionId);

            setTimeout(() => {
                const analyzerIframe = document.getElementById('analyzerIframe');
                if (!analyzerIframe || !analyzerIframe.contentWindow) return;

                try {
                    if (typeof analyzerIframe.contentWindow.scrollToSection === 'function') {
                        analyzerIframe.contentWindow.scrollToSection(sectionId);
                        return;
                    }

                    const target = analyzerIframe.contentWindow.document.getElementById(sectionId);
                    if (target) {
                        target.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    }
                } catch (e) {
                    console.log('Analyzer section focus skipped:', e);
                }
            }, 180);
        }

        function openComparisonView() {
            setActiveSection('compare', { navTarget: 'compare', smooth: true });
            goToAnalyzerSection('comparisonCard', 'compare');
        }
        
        // Scroll to section
        function scrollToSection(section) {
            if (section === 'analyzer') {
                setActiveSection('analyzer', { smooth: true });
            } else {
                setActiveSection('form', { smooth: true });
            }
        }
        
        // Scroll to top
        function scrollToTop() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        
        // Print form - open in new window for proper printing
        function printForm() {
            try {
                // Try to sync form state before opening
                const formIframe = document.getElementById('formIframe');
                if (formIframe && formIframe.contentWindow) {
                    try {
                        // Ask iframe to save its state to localStorage
                        formIframe.contentWindow.postMessage({ type: 'SAVE_STATE' }, '*');
                    } catch (e) {
                        console.log('Save state error:', e);
                    }
                }
                
                // Open the form file directly in new window for printing
                setTimeout(() => {
                    window.open('Lottery_V41_Final.html', '_blank');
                }, 100);
            } catch (e) {
                console.log('Print error:', e);
                alert('❌ שגיאה בפתיחת הטופס להדפסה');
            }
        }
        
        // Show/hide scroll button
        window.addEventListener('scroll', () => {
            const scrollBtn = document.getElementById('scrollTopBtn');
            if (window.scrollY > 500) {
                scrollBtn.classList.add('show');
            } else {
                scrollBtn.classList.remove('show');
            }
        });
        
        // Transfer numbers from analyzer to form
        function transferToForm(numbers, strong) {
            // Store in localStorage
            localStorage.setItem('lottoTransfer', JSON.stringify({
                numbers: numbers,
                strong: strong,
                timestamp: Date.now()
            }));
            
            // Show notification
            const notification = document.getElementById('transferNotification');
            const text = document.getElementById('transferText');
            text.textContent = `המספרים ${numbers.join(', ')} + חזק: ${strong} הועברו!`;
            notification.classList.add('show');
            
            // Scroll to form
            setTimeout(() => {
                setActiveSection('form', { smooth: true });
            }, 1000);
            
            // Auto-close notification
            setTimeout(() => {
                notification.classList.remove('show');
            }, 4000);
            
            // Try to trigger form filling in iframe
            try {
                const formIframe = document.getElementById('formIframe');
                if (formIframe && formIframe.contentWindow) {
                    formIframe.contentWindow.postMessage({
                        type: 'FILL_NUMBERS',
                        numbers: numbers,
                        strong: strong
                    }, '*');
                }
            } catch (e) {
                console.log('Iframe communication:', e);
            }
        }
        
        function closeNotification() {
            document.getElementById('transferNotification').classList.remove('show');
        }
        
        // Listen for messages from analyzer iframe
        window.addEventListener('message', (event) => {
            if (event.data && event.data.type === 'TRANSFER_TO_FORM') {
                transferToForm(event.data.numbers, event.data.strong);
            } else if (event.data && event.data.type === 'FILL_ALL_TABLES') {
                // העברת כל הקומבינציות לטופס
                fillAllTablesToForm(event.data.combinations);
            }
        });
        
        // מילוי כל הטבלאות מקומבינציות
        function fillAllTablesToForm(combinations) {
            const formIframe = document.getElementById('formIframe');
            if (formIframe && formIframe.contentWindow) {
                formIframe.contentWindow.postMessage({
                    type: 'FILL_ALL_TABLES',
                    combinations: combinations
                }, '*');
            }
            
            // Show notification
            const notification = document.getElementById('transferNotification');
            const text = document.getElementById('transferText');
            text.textContent = `${combinations.length} קומבינציות הועברו לטופס!`;
            notification.classList.add('show');
            
            // Scroll to form
            setTimeout(() => {
                setActiveSection('form', { smooth: true });
            }, 500);
            
            // Auto-close notification
            setTimeout(() => {
                notification.classList.remove('show');
            }, 4000);
        }
        
        // Initialize system
        updateViewportMetrics();
        setActiveSection(activeShellSection, { preserveScroll: true });
        document.getElementById('analyzerIframe').addEventListener('load', setEmbeddedAnalyzerMode);
        window.addEventListener('resize', updateViewportMetrics);
        window.addEventListener('orientationchange', updateViewportMetrics);
        if (window.visualViewport) {
            window.visualViewport.addEventListener('resize', updateViewportMetrics);
            window.visualViewport.addEventListener('scroll', updateViewportMetrics);
        }
        window.addEventListener('load', updateViewportMetrics);
        console.log('🎰 Lotto All-In-One System Ready!');
    </script>
</body>
</html>
